    <rect x="100" y="290" width="88" height="70" rx="2"/>
    <rect x="92" y="278" width="104" height="18" rx="2"/>
    <rect x="90" y="348" width="108" height="18" rx="0" opacity="0.5"/>
    <rect x="200" y="260" width="58" height="105" rx="2"/>
    <rect x="188" y="248" width="82" height="20" rx="2"/>
    <rect x="208" y="218" width="14" height="38"/>
    <rect x="234" y="228" width="11" height="32"/>
    <polygon points="302,366 318,218 334,366"/>
    <rect x="302" y="366" width="32" height="6" rx="1"/>
    <rect x="306" y="302" width="24" height="4" rx="1"/>
    <rect x="309" y="265" width="18" height="3" rx="1"/>
