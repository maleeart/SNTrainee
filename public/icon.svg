<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle -->
  <rect width="512" height="512" rx="100" fill="#002B80"/>

  <!-- Outer ring -->
  <circle cx="256" cy="210" r="165" fill="none" stroke="#1a4db3" stroke-width="8"/>

  <!-- Power plant silhouette -->
  <g fill="#1a4db3" opacity="0.9">
    <!-- Dam structure -->
    <rect x="100" y="240" width="80" height="60" rx="2"/>
    <rect x="92" y="230" width="96" height="16" rx="2"/>
    <!-- Water -->
    <ellipse cx="140" cy="310" rx="48" ry="8" fill="#1565c0" opacity="0.6"/>
    <!-- Building -->
    <rect x="195" y="200" width="50" height="100" rx="2"/>
    <rect x="185" y="190" width="70" height="20" rx="2"/>
    <!-- Chimney -->
    <rect x="205" y="170" width="12" height="35"/>
    <rect x="228" y="178" width="10" height="27"/>
    <!-- Pylon -->
    <polygon points="280,300 294,180 308,300" fill="#1a4db3"/>
    <line x1="280" y1="300" x2="308" y2="300" stroke="#1a4db3" stroke-width="6"/>
    <line x1="283" y1="250" x2="305" y2="250" stroke="#1a4db3" stroke-width="4"/>
    <line x1="286" y1="220" x2="302" y2="220" stroke="#1a4db3" stroke-width="3"/>
    <!-- Wires -->
    <path d="M 308 185 Q 360 200 400 190" stroke="#1a4db3" stroke-width="2.5" fill="none"/>
    <path d="M 308 195 Q 360 210 400 200" stroke="#1a4db3" stroke-width="2.5" fill="none"/>
  </g>

  <!-- Lightning bolt (gold) -->
  <polygon points="285,60 240,190 270,190 225,320 310,165 275,165 315,60" fill="#F5C518" filter="url(#glow)"/>
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Bottom arc accent -->
  <path d="M 80 340 Q 256 390 432 340" stroke="#F5C518" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 95 352 Q 256 400 417 352" stroke="#F5C518" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Text: กบห-ธ. -->
  <text x="256" y="430" text-anchor="middle" font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="72" font-weight="900" font-style="italic" fill="#002B80"
    stroke="#002B80" stroke-width="1">
    กบห-ธ.
  </text>
  <text x="256" y="430" text-anchor="middle" font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="72" font-weight="900" font-style="italic" fill="white">
    กบห-ธ.
  </text>

  <!-- Subtext -->
  <text x="256" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#F5C518" font-weight="bold">
    กฟผ. สำนักงานไทรน้อย
  </text>
</svg>
